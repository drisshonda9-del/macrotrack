<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MacroTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0f;--bg2:#13131a;--bg3:#1c1c26;--bg4:#252530;--border:#2a2a38;--border2:#3a3a50;--txt:#f0f0f8;--txt2:#8888aa;--txt3:#4a4a66;--orange:#ff6b2b;--blue:#4488ff;--purple:#9966ff;--green:#22cc88;--red:#ff4466;--font:'Syne',sans-serif;--mono:'DM Mono',monospace;--radius:16px;--radius-sm:10px;--safe-bottom:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--font)}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto}
.header{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--orange)}
.date-txt{font-size:11px;color:var(--txt3);font-family:var(--mono);margin-top:2px}
.btn-goals{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--txt2);padding:8px 14px;font-size:12px;font-family:var(--font);cursor:pointer;font-weight:600}
.tabs{display:flex;gap:6px;padding:0 20px 12px;flex-shrink:0}
.tab{padding:8px 18px;border-radius:var(--radius-sm);border:none;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.tab.active{background:var(--orange);color:#0a0a0f}
.tab:not(.active){background:var(--bg3);color:var(--txt3)}
.content{flex:1;overflow-y:auto;padding:0 20px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}
/* SUMMARY */
.summary{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.summary-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.summary-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.summary-kcal{font-size:28px;font-weight:800;font-family:var(--mono);color:var(--orange);line-height:1}
.summary-kcal.over{color:var(--red)}
.summary-goal{font-size:12px;color:var(--txt3);font-family:var(--mono)}
.remaining{background:var(--bg);border-radius:var(--radius-sm);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.remaining-lbl{font-size:11px;color:var(--txt3)}
.remaining-val{font-size:13px;font-weight:600;font-family:var(--mono)}
.remaining-val.ok{color:var(--green)}
.remaining-val.over{color:var(--red)}
/* BARS */
.bar-row{margin-bottom:11px}
.bar-head{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;font-family:var(--mono)}
.bar-head span:first-child{color:var(--txt3);text-transform:uppercase;letter-spacing:1px}
.bar-head span:last-child{color:var(--txt)}
.bar-head span:last-child.over{color:var(--red)}
.bar-track{height:5px;background:var(--bg);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
/* MEAL VISUAL */
.meal-visual{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.meal-visual-title{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.meal-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px 10px;background:var(--bg);border-radius:var(--radius-sm)}
.meal-row-name{font-size:12px;font-weight:600;width:90px;flex-shrink:0;color:var(--txt2)}
.meal-row-bar{flex:1;height:6px;background:var(--bg3);border-radius:99px;overflow:hidden}
.meal-row-fill{height:100%;border-radius:99px;background:var(--orange)}
.meal-row-kcal{font-size:11px;font-family:var(--mono);color:var(--orange);width:55px;text-align:right;flex-shrink:0}
.meal-row-detail{font-size:10px;color:var(--txt3);font-family:var(--mono);margin-top:2px}
/* MEAL PILLS */
.meal-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.meal-pill{padding:7px 14px;border-radius:var(--radius-sm);border:none;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.meal-pill.active{background:#1a2a5e;color:#6699ff}
.meal-pill:not(.active){background:var(--bg3);color:var(--txt3)}
.meal-count{background:#1d4ed8;color:#93c5fd;border-radius:99px;padding:1px 6px;font-size:10px;margin-left:4px}
/* BUTTONS */
.add-btn{width:100%;padding:12px;border-radius:var(--radius);border:1.5px dashed var(--border);background:none;color:var(--txt3);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px}
.add-btn:active{border-color:var(--orange);color:var(--orange)}
.preset-btn{width:100%;padding:12px;border-radius:var(--radius);border:1.5px dashed #2a3a20;background:none;color:#22cc88;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px}
.preset-btn:active{border-color:var(--green);background:#0a1a0a}
/* ENTRIES */
.entries-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.entries-head{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1.5px}
.entry{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--bg)}
.entry:last-child{border-bottom:none}
.entry-info{flex:1}
.entry-name{font-size:14px;font-weight:600;margin-bottom:3px}
.entry-macros{font-size:11px;font-family:var(--mono);color:var(--txt3)}
.entry-macros .ek{color:var(--orange)}
.entry-macros .ep{color:var(--blue)}
.entry-macros .eg{color:var(--purple)}
.entry-macros .el{color:var(--green)}
.entry-del{background:none;border:none;color:var(--border2);font-size:18px;cursor:pointer;padding:4px 8px}
/* HISTORY */
.hist-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hist-date{font-size:13px;font-family:var(--mono);color:var(--txt2)}
.hist-kcal{font-family:var(--mono);font-size:15px;font-weight:600}
.hist-pct{color:var(--txt3);font-size:12px;margin-left:4px}
.hist-macros{display:flex;gap:6px}
.hist-macro{background:var(--bg);border-radius:8px;padding:5px 10px;flex:1;text-align:center}
.hist-macro-lbl{font-size:10px;color:var(--txt3)}
.hist-macro-val{font-size:13px;font-weight:600;font-family:var(--mono)}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--txt3)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty p{font-size:14px}
/* BOTTOM NAV */
.bottom-nav{height:calc(60px + var(--safe-bottom));background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;flex-shrink:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:0}
.nav-icon{font-size:20px}
.nav-lbl{font-size:10px;font-family:var(--font);font-weight:600;color:var(--txt3)}
.nav-item.active .nav-lbl{color:var(--orange)}
/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.center{align-items:center;padding:20px}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:90dvh;overflow-y:auto;padding:24px 20px;border:1px solid var(--border)}
.modal.center-modal{border-radius:var(--radius);max-height:85dvh}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:17px;font-weight:700}
.modal-close{background:none;border:none;color:var(--txt3);font-size:22px;cursor:pointer;line-height:1}
/* SEARCH */
.search-input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);background:var(--bg);border:1px solid var(--border);color:var(--txt);font-size:14px;font-family:var(--font);outline:none;margin-bottom:10px}
.search-input::placeholder{color:var(--txt3)}
.cat-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cat-pill{padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--bg);color:var(--txt3);font-size:11px;font-family:var(--font);cursor:pointer;font-weight:600}
.result-item{display:flex;justify-content:space-between;align-items:center;padding:11px 12px;border-radius:var(--radius-sm);background:var(--bg);border:1px solid var(--border);margin-bottom:5px;cursor:pointer}
.result-item.perso{border-color:#3a2a10}
.result-name{font-size:13px;font-weight:600}
.result-cat{font-size:11px;color:var(--txt3);margin-top:2px}
.result-kcal{font-size:12px;font-family:var(--mono);color:var(--orange);white-space:nowrap;margin-left:8px}
.badge-perso{font-size:10px;background:#3a2a10;color:#ffaa44;border-radius:6px;padding:2px 6px;margin-left:6px}
.del-perso{background:none;border:none;color:var(--txt3);font-size:14px;cursor:pointer;padding:2px 6px}
/* QTY / PREVIEW */
.qty-row{display:flex;align-items:center;gap:10px;margin:14px 0}
.qty-input{width:80px;padding:9px;border-radius:var(--radius-sm);background:var(--bg);border:1px solid var(--border);color:var(--txt);font-size:16px;font-family:var(--mono);text-align:center;outline:none}
.qty-lbl{font-size:13px;color:var(--txt2)}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.preview-box{background:var(--bg);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.preview-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.preview-val{font-size:15px;font-weight:700;font-family:var(--mono)}
/* SEGMENT */
.segment{display:flex;background:var(--bg);border-radius:var(--radius-sm);padding:3px;margin-bottom:14px}
.seg-btn{flex:1;padding:7px 4px;border-radius:8px;border:none;font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.seg-btn.active{background:var(--bg3);color:var(--txt)}
.seg-btn:not(.active){background:none;color:var(--txt3)}
/* FORM */
.form-label{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block}
.form-input{width:100%;padding:10px 12px;border-radius:var(--radius-sm);background:var(--bg);border:1px solid var(--border);color:var(--txt);font-size:14px;font-family:var(--font);outline:none;margin-bottom:10px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.confirm-btn{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--orange);color:#0a0a0f;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.confirm-btn:disabled{background:var(--border);color:var(--txt3)}
.confirm-btn.green{background:var(--green)}
/* PRESET CARDS */
.preset-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.preset-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.preset-card-name{font-size:14px;font-weight:700}
.preset-card-kcal{font-size:13px;font-family:var(--mono);color:var(--orange)}
.preset-card-macros{font-size:11px;font-family:var(--mono);color:var(--txt3);margin-bottom:8px}
.preset-card-actions{display:flex;gap:6px}
.preset-use-btn{flex:1;padding:8px;border-radius:8px;border:none;background:var(--green);color:#0a0a0f;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer}
.preset-del-btn{padding:8px 12px;border-radius:8px;border:none;background:var(--bg3);color:var(--red);font-size:12px;cursor:pointer}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="logo">Macro<span>Track</span></div>
      <div class="date-txt" id="header-date"></div>
    </div>
    <button class="btn-goals" onclick="openGoals()">🎯 Objectifs</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today',this)">Aujourd'hui</button>
    <button class="tab" onclick="switchTab('history',this)">Historique</button>
  </div>
  <div class="content">
    <!-- TODAY -->
    <div id="tab-today">
      <div class="summary">
        <div class="summary-top">
          <div>
            <div class="summary-label">Total du jour</div>
            <div class="summary-kcal" id="total-kcal">0</div>
            <div class="summary-goal" id="goal-display">/ 2500 kcal</div>
          </div>
        </div>
        <div id="bars"></div>
        <div class="remaining">
          <span class="remaining-lbl">Restant</span>
          <span class="remaining-val ok" id="remaining-val">2500 kcal restantes</span>
        </div>
      </div>
      <!-- MEAL VISUAL -->
      <div class="meal-visual" id="meal-visual-block">
        <div class="meal-visual-title">Répartition par repas</div>
        <div id="meal-visual-rows"></div>
      </div>
      <div class="meal-pills" id="meal-pills"></div>
      <button class="preset-btn" onclick="openPresets()">⚡ Repas pré-enregistré</button>
      <button class="add-btn" onclick="openAdd()">+ Ajouter un aliment</button>
      <div id="entries-container"></div>
      <div style="height:20px"></div>
    </div>
    <!-- HISTORY -->
    <div id="tab-history" class="hidden">
      <div id="history-list"></div>
      <div style="height:20px"></div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="nav-item active" id="nav-today" onclick="switchTab('today',null,'nav-today')">
      <span class="nav-icon">🍽️</span><span class="nav-lbl">Aujourd'hui</span>
    </button>
    <button class="nav-item" id="nav-history" onclick="switchTab('history',null,'nav-history')">
      <span class="nav-icon">📊</span><span class="nav-lbl">Historique</span>
    </button>
  </div>
</div>

<!-- MODAL ADD -->
<div class="modal-overlay hidden" id="modal-add">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="add-title">+ Ajouter</div>
      <button class="modal-close" onclick="closeAdd()">✕</button>
    </div>
    <div class="segment">
      <button class="seg-btn active" id="seg-db" onclick="switchMode('db',this)">Base</button>
      <button class="seg-btn" id="seg-perso" onclick="switchMode('perso',this)">⭐ Perso</button>
      <button class="seg-btn" id="seg-manual" onclick="switchMode('manual',this)">+ Nouveau</button>
    </div>
    <div id="mode-db">
      <input class="search-input" id="search-input" placeholder="Chercher (poulet, chocolat, snickers…)" oninput="onSearch(this.value)">
      <div class="cat-pills" id="cat-pills"></div>
      <div id="results-list"></div>
      <div id="selected-panel" class="hidden">
        <div class="qty-row">
          <span class="qty-lbl">Quantité</span>
          <input class="qty-input" type="number" id="qty-db" value="100" oninput="updatePreview()">
          <span class="qty-lbl">g</span>
        </div>
        <div class="preview-grid" id="preview-db"></div>
        <button class="confirm-btn" onclick="confirmAdd()">✓ Ajouter</button>
      </div>
    </div>
    <div id="mode-perso" class="hidden">
      <div id="perso-list"></div>
      <div id="perso-selected-panel" class="hidden">
        <div class="qty-row">
          <span class="qty-lbl">Quantité</span>
          <input class="qty-input" type="number" id="qty-perso" value="100" oninput="updatePersoPreview()">
          <span class="qty-lbl">g</span>
        </div>
        <div class="preview-grid" id="preview-perso"></div>
        <button class="confirm-btn" onclick="confirmPersoAdd()">✓ Ajouter</button>
      </div>
    </div>
    <div id="mode-manual" class="hidden">
      <label class="form-label">Nom de l'aliment</label>
      <input class="form-input" id="m-name" placeholder="Ex : Pizza maison">
      <label class="form-label">Valeurs pour 100g</label>
      <div class="form-grid">
        <div><label class="form-label" style="color:#ff6b2b">Calories</label><input class="form-input" type="number" id="m-kcal" placeholder="0"></div>
        <div><label class="form-label" style="color:#4488ff">Protéines (g)</label><input class="form-input" type="number" id="m-prot" placeholder="0"></div>
        <div><label class="form-label" style="color:#9966ff">Glucides (g)</label><input class="form-input" type="number" id="m-gluc" placeholder="0"></div>
        <div><label class="form-label" style="color:#22cc88">Lipides (g)</label><input class="form-input" type="number" id="m-lip" placeholder="0"></div>
      </div>
      <div class="qty-row">
        <span class="qty-lbl">Quantité</span>
        <input class="qty-input" type="number" id="qty-manual" value="100">
        <span class="qty-lbl">g</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm)">
        <input type="checkbox" id="save-to-db" checked style="width:18px;height:18px;accent-color:var(--orange);cursor:pointer">
        <label for="save-to-db" style="font-size:13px;color:var(--txt2);cursor:pointer">Enregistrer dans ⭐ Mes aliments</label>
      </div>
      <button class="confirm-btn" onclick="confirmManual()">✓ Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL GOALS -->
<div class="modal-overlay center hidden" id="modal-goals">
  <div class="modal center-modal">
    <div class="modal-head">
      <div class="modal-title">🎯 Objectifs journaliers</div>
      <button class="modal-close" onclick="closeGoals()">✕</button>
    </div>
    <label class="form-label" style="color:#ff6b2b">Calories (kcal)</label>
    <input class="form-input" type="number" id="g-kcal">
    <label class="form-label" style="color:#4488ff">Protéines (g)</label>
    <input class="form-input" type="number" id="g-prot">
    <label class="form-label" style="color:#9966ff">Glucides (g)</label>
    <input class="form-input" type="number" id="g-gluc">
    <label class="form-label" style="color:#22cc88">Lipides (g)</label>
    <input class="form-input" type="number" id="g-lip">
    <button class="confirm-btn" onclick="saveGoals()">Enregistrer</button>
  </div>
</div>

<!-- MODAL PRESETS -->
<div class="modal-overlay hidden" id="modal-presets">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">⚡ Repas pré-enregistrés</div>
      <button class="modal-close" onclick="closePresets()">✕</button>
    </div>
    <div id="presets-list"></div>
    <button class="confirm-btn green" onclick="openSavePreset()" style="margin-top:8px">+ Enregistrer le repas actuel</button>
  </div>
</div>

<!-- MODAL SAVE PRESET -->
<div class="modal-overlay center hidden" id="modal-save-preset">
  <div class="modal center-modal">
    <div class="modal-head">
      <div class="modal-title">💾 Nommer ce repas</div>
      <button class="modal-close" onclick="closeSavePreset()">✕</button>
    </div>
    <p style="color:var(--txt3);font-size:13px;margin-bottom:14px">Le repas actuel (<span id="preset-meal-name"></span>) sera sauvegardé avec tous ses aliments.</p>
    <label class="form-label">Nom du repas</label>
    <input class="form-input" id="preset-name-input" placeholder="Ex : Petit-dej habituel">
    <button class="confirm-btn" onclick="confirmSavePreset()">Enregistrer</button>
  </div>
</div>

<script>
// ============================================================
// BASE ALIMENTAIRE COMPLÈTE 200+ aliments
// ============================================================
const DB = [
  // POULET - morceaux détaillés
  {n:"Poulet blanc / filet (cuit)",c:"Poulet",k:165,p:31,g:0,l:3.6},
  {n:"Poulet escalope (cuit)",c:"Poulet",k:160,p:30,g:0,l:3.2},
  {n:"Poulet cuisse (cuite)",c:"Poulet",k:209,p:26,g:0,l:11},
  {n:"Poulet haut de cuisse (cuit)",c:"Poulet",k:218,p:24,g:0,l:13},
  {n:"Poulet pilon (cuit)",c:"Poulet",k:185,p:27,g:0,l:8},
  {n:"Poulet aile (cuite)",c:"Poulet",k:203,p:25,g:0,l:11},
  {n:"Poulet rôti entier",c:"Poulet",k:195,p:27,g:0,l:9.5},
  {n:"Poulet pané (nuggets)",c:"Poulet",k:255,p:14,g:18,l:13},
  {n:"Poulet kebab",c:"Poulet",k:195,p:20,g:5,l:10},
  // BŒUF - morceaux détaillés

let customDB=[];
let presets=[];
let activeMeal="Déjeuner";
let selectedFood=null;
let selectedPerso=null;
let addMode="db";

function save(){
  localStorage.setItem("mt_goals",JSON.stringify(goals));
  localStorage.setItem("mt_entries",JSON.stringify(entries));
  localStorage.setItem("mt_custom",JSON.stringify(customDB));
  localStorage.setItem("mt_presets",JSON.stringify(presets));
}
function load(){
  try{const g=localStorage.getItem("mt_goals");if(g)goals=JSON.parse(g);}catch(e){}
  try{const e=localStorage.getItem("mt_entries");if(e)entries=JSON.parse(e);}catch(e){}
  try{const c=localStorage.getItem("mt_custom");if(c)customDB=JSON.parse(c);}catch(e){}
  try{const p=localStorage.getItem("mt_presets");if(p)presets=JSON.parse(p);else presets=DEFAULT_PRESETS;}catch(e){presets=DEFAULT_PRESETS;}
}
function today(){return new Date().toISOString().split("T")[0];}
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});}
function totals(dayEntries){
  const t={k:0,p:0,g:0,l:0};
  (dayEntries||[]).forEach(e=>{t.k+=e.k;t.p+=e.p;t.g+=e.g;t.l+=e.l;});
  return t;
}
function mealTotals(meal){
  const t={k:0,p:0,g:0,l:0};
  (entries[today()]||[]).filter(e=>e.meal===meal).forEach(e=>{t.k+=e.k;t.p+=e.p;t.g+=e.g;t.l+=e.l;});
  return t;
}

function render(){
  const d=new Date();
  document.getElementById("header-date").textContent=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  const t=totals(entries[today()]);
  const ke=document.getElementById("total-kcal");
  ke.textContent=Math.round(t.k);
  ke.className="summary-kcal"+(t.k>goals.k?" over":"");
  document.getElementById("goal-display").textContent="/ "+goals.k+" kcal";
  // bars
  document.getElementById("bars").innerHTML=[["kcal",t.k,goals.k,"k"],["Protéines",t.p,goals.p,"p"],["Glucides",t.g,goals.g,"g"],["Lipides",t.l,goals.l,"l"]].map(([lbl,val,goal,key])=>{
    const pct=Math.min((val/goal)*100,100);const over=val>goal;const col=over?"#ff4466":COLORS[key];const dv=key==="k"?Math.round(val):(Math.round(val*10)/10);
    return`<div class="bar-row"><div class="bar-head"><span>${lbl}</span><span class="${over?'over':''}">${dv}/${goal}${key==="k"?"":"g"}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div></div>`;
  }).join("");
  // remaining
  const rem=goals.k-t.k;
  const rv=document.getElementById("remaining-val");
  rv.textContent=rem>=0?Math.round(rem)+" kcal restantes":Math.round(Math.abs(rem))+" kcal en surplus";
  rv.className="remaining-val "+(rem>=0?"ok":"over");
  // meal visual
  const mvr=document.getElementById("meal-visual-rows");
  const maxK=Math.max(...MEALS.map(m=>mealTotals(m).k),1);
  mvr.innerHTML=MEALS.map(m=>{
    const mt=mealTotals(m);
    if(mt.k===0)return`<div class="meal-row" style="opacity:.35"><div class="meal-row-name">${m}</div><div class="meal-row-bar"><div class="meal-row-fill" style="width:0%"></div></div><div class="meal-row-kcal">0 kcal</div></div>`;
    const pct=Math.round((mt.k/maxK)*100);
    return`<div class="meal-row" onclick="setMeal('${m}')">
      <div class="meal-row-name">${m}</div>
      <div style="flex:1">
        <div class="meal-row-bar"><div class="meal-row-fill" style="width:${pct}%"></div></div>
        <div class="meal-row-detail">P:${Math.round(mt.p)}g G:${Math.round(mt.g)}g L:${Math.round(mt.l)}g</div>
      </div>
      <div class="meal-row-kcal">${Math.round(mt.k)} kcal</div>
    </div>`;
  }).join("");
  // meal pills
  document.getElementById("meal-pills").innerHTML=MEALS.map(m=>{
    const count=(entries[today()]||[]).filter(e=>e.meal===m).length;
    const active=m===activeMeal;
    return`<button class="meal-pill${active?" active":""}" onclick="setMeal('${m}')">${m}${count>0?`<span class="meal-count">${count}</span>`:""}</button>`;
  }).join("");
  // entries
  const mealEntries=(entries[today()]||[]).map((e,i)=>({...e,i})).filter(e=>e.meal===activeMeal);
  const ec=document.getElementById("entries-container");
  if(mealEntries.length===0){
    ec.innerHTML=(entries[today()]||[]).length===0?`<div class="empty"><div class="empty-icon">🍽️</div><p>Rien ajouté aujourd'hui</p></div>`:"";
  } else {
    ec.innerHTML=`<div class="entries-card"><div class="entries-head">${activeMeal}</div>${mealEntries.map(e=>`<div class="entry"><div class="entry-info"><div class="entry-name">${e.n}</div><div class="entry-macros">${e.qty}g · <span class="ek">${e.k} kcal</span> · <span class="ep">P:${e.p}g</span> · <span class="eg">G:${e.g}g</span> · <span class="el">L:${e.l}g</span></div></div><button class="entry-del" onclick="delEntry(${e.i})">✕</button></div>`).join("")}</div>`;
  }
  renderHistory();
  document.getElementById("add-title").textContent="+ Ajouter à "+activeMeal;
}

function renderHistory(){
  const hl=document.getElementById("history-list");
  const hist=Object.entries(entries).filter(([d])=>d!==today()).sort(([a],[b])=>b.localeCompare(a)).slice(0,14);
  if(hist.length===0){hl.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><p>Aucun historique pour l'instant</p></div>`;return;}
  hl.innerHTML=hist.map(([date,ents])=>{
    const t=totals(ents);const pct=Math.round((t.k/goals.k)*100);const col=pct>105?"#ff4466":pct>85?"#22cc88":"#ff6b2b";
    return`<div class="hist-card"><div class="hist-top"><span class="hist-date">${fmtDate(date)}</span><span class="hist-kcal" style="color:${col}">${Math.round(t.k)} kcal<span class="hist-pct">(${pct}%)</span></span></div><div class="hist-macros"><div class="hist-macro"><div class="hist-macro-lbl">Prot.</div><div class="hist-macro-val" style="color:#4488ff">${Math.round(t.p)}g</div></div><div class="hist-macro"><div class="hist-macro-lbl">Gluc.</div><div class="hist-macro-val" style="color:#9966ff">${Math.round(t.g)}g</div></div><div class="hist-macro"><div class="hist-macro-lbl">Lip.</div><div class="hist-macro-val" style="color:#22cc88">${Math.round(t.l)}g</div></div></div></div>`;
  }).join("");
}

function switchTab(tab,btn,navId){
  document.getElementById("tab-today").classList.toggle("hidden",tab!=="today");
  document.getElementById("tab-history").classList.toggle("hidden",tab!=="history");
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  if(tab==="today")document.querySelectorAll(".tab")[0].classList.add("active");
  else document.querySelectorAll(".tab")[1].classList.add("active");
  const nav=document.getElementById(navId||(tab==="today"?"nav-today":"nav-history"));
  if(nav)nav.classList.add("active");
  renderHistory();
}
function setMeal(m){activeMeal=m;render();}
function delEntry(idx){entries[today()].splice(idx,1);save();render();}

// GOALS
function openGoals(){document.getElementById("g-kcal").value=goals.k;document.getElementById("g-prot").value=goals.p;document.getElementById("g-gluc").value=goals.g;document.getElementById("g-lip").value=goals.l;document.getElementById("modal-goals").classList.remove("hidden");}
function closeGoals(){document.getElementById("modal-goals").classList.add("hidden");}
function saveGoals(){goals={k:parseInt(document.getElementById("g-kcal").value)||2500,p:parseInt(document.getElementById("g-prot").value)||166,g:parseInt(document.getElementById("g-gluc").value)||292,l:parseInt(document.getElementById("g-lip").value)||83};save();closeGoals();render();}

// PRESETS
function openPresets(){renderPresetsList();document.getElementById("modal-presets").classList.remove("hidden");}
function closePresets(){document.getElementById("modal-presets").classList.add("hidden");}
function renderPresetsList(){
  const pl=document.getElementById("presets-list");
  if(presets.length===0){pl.innerHTML=`<div class="empty"><div class="empty-icon">⚡</div><p>Aucun repas enregistré.<br>Ajoute des aliments puis enregistre.</p></div>`;return;}
  pl.innerHTML=presets.map((p,i)=>{
    const t={k:0,p:0,g:0,l:0};
    p.items.forEach(it=>{t.k+=it.k;t.p+=it.p;t.g+=it.g;t.l+=it.l;});
    return`<div class="preset-card">
      <div class="preset-card-head"><span class="preset-card-name">${p.name}</span><span class="preset-card-kcal">${Math.round(t.k)} kcal</span></div>
      <div class="preset-card-macros">P:${Math.round(t.p)}g · G:${Math.round(t.g)}g · L:${Math.round(t.l)}g · ${p.items.length} aliments · ${p.meal}</div>
      <div class="preset-card-actions">
        <button class="preset-use-btn" onclick="usePreset(${i})">✓ Utiliser pour ${activeMeal}</button>
        <button class="preset-del-btn" onclick="deletePreset(${i})">🗑</button>
      </div>
    </div>`;
  }).join("");
}
function usePreset(idx){
  const p=presets[idx];
  if(!entries[today()])entries[today()]=[];
  p.items.forEach(it=>entries[today()].push({...it,meal:activeMeal}));
  save();closePresets();render();
}
function deletePreset(idx){presets.splice(idx,1);save();renderPresetsList();}
function openSavePreset(){
  const mealItems=(entries[today()]||[]).filter(e=>e.meal===activeMeal);
  if(mealItems.length===0){alert("Aucun aliment dans "+activeMeal+" à enregistrer.");return;}
  document.getElementById("preset-meal-name").textContent=activeMeal;
  document.getElementById("preset-name-input").value=activeMeal+" habituel";
  closePresets();
  document.getElementById("modal-save-preset").classList.remove("hidden");
}
function closeSavePreset(){document.getElementById("modal-save-preset").classList.add("hidden");}
function confirmSavePreset(){
  const name=document.getElementById("preset-name-input").value.trim()||activeMeal+" habituel";
  const items=(entries[today()]||[]).filter(e=>e.meal===activeMeal);
  presets.push({name,meal:activeMeal,items:[...items]});
  save();closeSavePreset();
}

// ADD MODAL
function openAdd(){
  selectedFood=null;selectedPerso=null;
  document.getElementById("search-input").value="";
  document.getElementById("results-list").innerHTML="";
  document.getElementById("selected-panel").classList.add("hidden");
  document.getElementById("perso-selected-panel").classList.add("hidden");
  document.getElementById("qty-db").value="100";
  document.getElementById("m-name").value="";document.getElementById("m-kcal").value="";document.getElementById("m-prot").value="";document.getElementById("m-gluc").value="";document.getElementById("m-lip").value="";document.getElementById("qty-manual").value="100";
  document.getElementById("save-to-db").checked=true;
  document.getElementById("mode-db").classList.remove("hidden");
  document.getElementById("mode-perso").classList.add("hidden");
  document.getElementById("mode-manual").classList.add("hidden");
  document.querySelectorAll(".seg-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("seg-db").classList.add("active");
  addMode="db";renderCats();
  document.getElementById("modal-add").classList.remove("hidden");
}
function closeAdd(){document.getElementById("modal-add").classList.add("hidden");}
function switchMode(mode,btn){
  addMode=mode;
  document.getElementById("mode-db").classList.toggle("hidden",mode!=="db");
  document.getElementById("mode-perso").classList.toggle("hidden",mode!=="perso");
  document.getElementById("mode-manual").classList.toggle("hidden",mode!=="manual");
  document.querySelectorAll(".seg-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  if(mode==="perso")renderPersoList();
}
function renderCats(){
  const cats=[...new Set(DB.map(f=>f.c))];
  document.getElementById("cat-pills").innerHTML=cats.map(c=>`<button class="cat-pill" onclick="filterCat('${c}')">${c}</button>`).join("");
}
function filterCat(cat){document.getElementById("search-input").value=cat;onSearch(cat);}
function onSearch(q){
  selectedFood=null;document.getElementById("selected-panel").classList.add("hidden");
  if(!q.trim()){document.getElementById("results-list").innerHTML="";return;}
  const ql=q.toLowerCase();
  const fromDB=DB.filter(f=>f.n.toLowerCase().includes(ql)||f.c.toLowerCase().includes(ql)).slice(0,7);
  const fromCustom=customDB.filter(f=>f.n.toLowerCase().includes(ql)).slice(0,4);
  const all=[...fromCustom.map(f=>({...f,_perso:true})),...fromDB];
  document.getElementById("results-list").innerHTML=all.length===0?
    `<p style="color:var(--txt3);font-size:13px;text-align:center;padding:16px 0">Aucun résultat</p>`:
    all.map((f,i)=>`<div class="result-item${f._perso?' perso':''}" onclick="selectFoodAny(${i})"><div style="flex:1;min-width:0"><div class="result-name">${f.n}${f._perso?'<span class="badge-perso">⭐</span>':''}</div><div class="result-cat">${f.c||'Perso'}</div></div><div class="result-kcal">${f.k} kcal/100g</div></div>`).join("");
  window._searchResults=all;
}
function selectFoodAny(idx){
  selectedFood=(window._searchResults||[])[idx];
  document.getElementById("selected-panel").classList.remove("hidden");
  updatePreview();
  document.getElementById("selected-panel").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function renderPersoList(){
  selectedPerso=null;document.getElementById("perso-selected-panel").classList.add("hidden");
  const pl=document.getElementById("perso-list");
  if(customDB.length===0){pl.innerHTML=`<div class="empty"><div class="empty-icon">⭐</div><p>Aucun aliment perso.<br>Ajoute-en via "+ Nouveau".</p></div>`;return;}
  pl.innerHTML=customDB.map((f,i)=>`<div class="result-item perso" onclick="selectPerso(${i})" style="display:flex;align-items:center"><div style="flex:1"><div class="result-name">${f.n} <span class="badge-perso">⭐</span></div><div class="result-cat">${f.k} kcal · P:${f.p}g · G:${f.g}g · L:${f.l}g</div></div><button class="del-perso" onclick="event.stopPropagation();deletePerso(${i})">🗑</button></div>`).join("");
}
function selectPerso(idx){
  selectedPerso=customDB[idx];
  document.getElementById("perso-selected-panel").classList.remove("hidden");
  document.getElementById("qty-perso").value="100";
  updatePersoPreview();
  document.getElementById("perso-selected-panel").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function updatePersoPreview(){
  if(!selectedPerso)return;
  const q=parseFloat(document.getElementById("qty-perso").value)||0;const f=q/100;
  document.getElementById("preview-perso").innerHTML=[["kcal",Math.round(selectedPerso.k*f),COLORS.k],["Protéines",Math.round(selectedPerso.p*f*10)/10+"g",COLORS.p],["Glucides",Math.round(selectedPerso.g*f*10)/10+"g",COLORS.g],["Lipides",Math.round(selectedPerso.l*f*10)/10+"g",COLORS.l]].map(([lbl,val,col])=>`<div class="preview-box"><div class="preview-lbl">${lbl}</div><div class="preview-val" style="color:${col}">${val}</div></div>`).join("");
}
function confirmPersoAdd(){
  if(!selectedPerso)return;
  const q=parseFloat(document.getElementById("qty-perso").value)||0;const f=q/100;
  if(!entries[today()])entries[today()]=[];
  entries[today()].push({n:selectedPerso.n,meal:activeMeal,qty:q,k:Math.round(selectedPerso.k*f),p:Math.round(selectedPerso.p*f*10)/10,g:Math.round(selectedPerso.g*f*10)/10,l:Math.round(selectedPerso.l*f*10)/10});
  save();closeAdd();render();
}
function deletePerso(idx){customDB.splice(idx,1);save();renderPersoList();}
function updatePreview(){
  if(!selectedFood)return;
  const q=parseFloat(document.getElementById("qty-db").value)||0;const f=q/100;
  document.getElementById("preview-db").innerHTML=[["kcal",Math.round(selectedFood.k*f),COLORS.k],["Protéines",Math.round(selectedFood.p*f*10)/10+"g",COLORS.p],["Glucides",Math.round(selectedFood.g*f*10)/10+"g",COLORS.g],["Lipides",Math.round(selectedFood.l*f*10)/10+"g",COLORS.l]].map(([lbl,val,col])=>`<div class="preview-box"><div class="preview-lbl">${lbl}</div><div class="preview-val" style="color:${col}">${val}</div></div>`).join("");
}
function confirmAdd(){
  if(!selectedFood)return;
  const q=parseFloat(document.getElementById("qty-db").value)||0;const f=q/100;
  if(!entries[today()])entries[today()]=[];
  entries[today()].push({n:selectedFood.n,meal:activeMeal,qty:q,k:Math.round(selectedFood.k*f),p:Math.round(selectedFood.p*f*10)/10,g:Math.round(selectedFood.g*f*10)/10,l:Math.round(selectedFood.l*f*10)/10});
  save();closeAdd();render();
}
function confirmManual(){
  const q=parseFloat(document.getElementById("qty-manual").value)||100;const f=q/100;
  const kcal=parseFloat(document.getElementById("m-kcal").value)||0;if(!kcal)return;
  const name=document.getElementById("m-name").value||"Aliment perso";
  const prot=parseFloat(document.getElementById("m-prot").value)||0;
  const gluc=parseFloat(document.getElementById("m-gluc").value)||0;
  const lip=parseFloat(document.getElementById("m-lip").value)||0;
  if(document.getElementById("save-to-db").checked){
    const already=customDB.find(x=>x.n.toLowerCase()===name.toLowerCase());
    if(!already)customDB.push({n:name,k:kcal,p:prot,g:gluc,l:lip});
  }
  if(!entries[today()])entries[today()]=[];
  entries[today()].push({n:name,meal:activeMeal,qty:q,k:Math.round(kcal*f),p:Math.round(prot*f*10)/10,g:Math.round(gluc*f*10)/10,l:Math.round(lip*f*10)/10});
  save();closeAdd();render();
}

document.getElementById("modal-add").addEventListener("click",function(e){if(e.target===this)closeAdd();});
document.getElementById("modal-goals").addEventListener("click",function(e){if(e.target===this)closeGoals();});
document.getElementById("modal-presets").addEventListener("click",function(e){if(e.target===this)closePresets();});
document.getElementById("modal-save-preset").addEventListener("click",function(e){if(e.target===this)closeSavePreset();});

load();render();
</script>
</body>
</html>
